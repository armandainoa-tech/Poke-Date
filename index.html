<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Little Adventure ♡</title>

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Patrick+Hand&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="scene">

<div class="moon">
🌙
</div>

<!-- POKEMON DECORATIONS -->

<img class="pokemon gengar" src="IMG_2059.png">

<img class="pokemon espeon" src="IMG_2060.png">

<img class="pokemon clefairy" src="IMG_2061.png">

<img class="pokemon skitty" src="IMG_2062.png">

<img class="pokemon mew" src="IMG_2063.png">





<!-- OPENING -->

<section id="opening" class="screen">


<div class="card">


<h1>
our little adventure awaits... ♡
</h1>


<p>
i made something special for you 💜
</p>


<button onclick="startAdventure()">

💌 let's plan our date

</button>


</div>


</section>









<!-- PLANNER -->

<section id="planner" class="screen hidden">


<div class="card">


<h1>
let's plan our date ♡
</h1>


<p>
tell me everything ✨
</p>




<label>
📅 when are we going?
</label>


<input 
type="date"
id="dateInput">





<label>
🕒 what time?
</label>


<input 
type="time"
id="timeInput">





<label>
📍 where are we going?
</label>


<input
type="text"
id="locationInput"
placeholder="our little adventure spot...">





<label>
👗 dress code
</label>


<input
type="text"
id="dressInput"
placeholder="cute, cozy, fancy...">





<label>
🎒 bring this
</label>


<input
type="text"
id="bringInput"
placeholder="hoodie, snacks, blanket...">





<label>
🌸 plans
</label>


<textarea
id="plansInput"
rows="5"
placeholder="tell me our adventure...">
</textarea>





<button onclick="previewAdventure()">

✨ preview our date

</button>



</div>


</section>









<!-- PREVIEW -->

<section id="preview" class="screen hidden">


<div class="card final-card">


<h1>
our adventure details ♡
</h1>




<div class="invitation-paper">


<p id="previewDetails"></p>


</div>





<button onclick="downloadCalendar()">

📅 save to calendar

</button>




<button onclick="confirmAdventure()">

💜 make it official

</button>



</div>


</section>









<!-- ACCEPTED -->

<section id="acceptedPage" class="screen hidden">


<div class="card final-card pokemon-finale">



<img 
class="final-gengar"
src="IMG_2059.png">



<img 
class="final-mew"
src="IMG_2063.png">



<img 
class="final-clefairy"
src="IMG_2061.png">






<h1>

✨ it's official ♡ ✨

</h1>





<p>

you unlocked a little adventure 💜

<br><br>

🌸 our date is officially planned 🌸

<br><br>

can't wait to see you ♡

</p>






<div class="pokeball">

🔴⚪

</div>





<div class="celebration">

💜 ✨ 🩷 ✨ 💜

</div>



</div>


</section>







</div>









<!-- EMAILJS -->

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>


<script>

emailjs.init({

publicKey:

"j5hvrNCMFnB_AUKLb"

});

</script>







<!-- FIREBASE -->

<script type="module">


import { saveAdventure }

from "./firebase.js";


window.saveAdventure = saveAdventure;


</script>







<!-- SCRIPT -->

<script src="script.js"></script>



</body>

</html>
