<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>Adventure Updates ♡</title>


<style>

body{

font-family:Arial,sans-serif;

text-align:center;

padding:40px;

background:
linear-gradient(
135deg,
#ffd6ed,
#d9c8ff
);

}


.card{

background:white;

padding:35px;

border-radius:30px;

max-width:600px;

margin:auto;

box-shadow:
0 10px 30px rgba(0,0,0,.15);

}


h1{

color:#a05cff;

}


#status{

font-size:20px;

line-height:1.8;

color:#5b4268;

}


img{

width:100px;

margin:10px;

}


</style>


</head>



<body>


<div class="card">


<h1>
💜 Adventure Updates ♡
</h1>


<img src="IMG_2059.png">


<div id="status">

Waiting for adventure...

</div>


</div>






<script type="module">


import { initializeApp }

from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";



import {

getFirestore,

doc,

onSnapshot

}

from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";







const firebaseConfig = {


apiKey:
"AIzaSyBBzTwMmhD1t-gZeX5W35K1aG2okrUo91o",


authDomain:
"date-site-bfb53.firebaseapp.com",


projectId:
"date-site-bfb53",


storageBucket:
"date-site-bfb53.firebasestorage.app",


messagingSenderId:
"305849379339",


appId:
"1:305849379339:web:ded141e65eae95ec31f50e"

};






const app =
initializeApp(firebaseConfig);



const db =
getFirestore(app);






const status =
document.getElementById("status");







onSnapshot(

doc(
db,
"adventures",
"latest"
),


(snapshot)=>{



if(snapshot.exists()){


const data =
snapshot.data();





status.innerHTML = `



💗 <b>${data.message || "Adventure Accepted ♡"}</b>



<br><br>



📅 <b>Date:</b><br>

${data.date || "Not chosen"}



<br><br>



⏰ <b>Time:</b><br>

${data.time || "Not chosen"}



<br><br>



📍 <b>Location:</b><br>

${data.location || "Not chosen"}



<br><br>



👗 <b>Dress:</b><br>

${data.dressCode || "Cute outfit ♡"}



<br><br>



🎒 <b>Bring:</b><br>

${data.bring || "Just yourself 💜"}



<br><br>



🌸 <b>Plans:</b><br>

${data.plans || "Adventure waiting..."}



`;



}



}

);


</script>



</body>

</html>
