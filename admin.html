<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Adventure Updates ♡</title>


<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Patrick+Hand&display=swap" rel="stylesheet">


<style>


*{
box-sizing:border-box;
}



body{

margin:0;

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

font-family:"Patrick Hand",cursive;


background:

linear-gradient(
160deg,
#ffd6ea,
#e7d5ff,
#c6a5ff
);


overflow:hidden;

}







.card{


width:90%;

max-width:650px;

padding:45px;


background:

rgba(255,255,255,.92);



border-radius:45px;



box-shadow:

0 30px 80px rgba(120,70,180,.35);



text-align:center;


position:relative;

z-index:5;


}






h1{


font-family:"Caveat",cursive;


font-size:55px;


color:#6b3fa0;


}




#status{


font-size:25px;


color:#6b3fa0;


line-height:1.6;


}






.pokemon{


position:absolute;


width:160px;


animation:float 4s infinite;


}



.gengar{


bottom:20px;


left:20px;


}



.mew{


top:20px;


right:30px;


width:120px;


}







@keyframes float{


0%{

transform:translateY(0);

}



50%{

transform:translateY(-15px);

}



100%{

transform:translateY(0);

}


}



</style>

</head>







<body>



<img 
class="pokemon gengar"
src="IMG_2059.png">



<img 
class="pokemon mew"
src="IMG_2063.png">







<div class="card">


<h1>

🌸 Adventure Updates ♡

</h1>



<div id="status">

Waiting for adventure...

</div>



</div>









<script type="module">


import { initializeApp } 
from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";



import {

getFirestore,

doc,

onSnapshot

}

from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";








const firebaseConfig = {


apiKey: "AIzaSyBBzTwMmhD1t-gZeX5W35K1aG2okrUo91o",


authDomain: "date-site-bfb53.firebaseapp.com",


projectId: "date-site-bfb53",


storageBucket: "date-site-bfb53.firebasestorage.app",


messagingSenderId: "305849379339",


appId: "1:305849379339:web:ded141e65eae95ec31f50e"


};







const app = initializeApp(firebaseConfig);


const db = getFirestore(app);







const status =

document.getElementById("status");








onSnapshot(

doc(db,"adventures","latest"),

(snapshot)=>{



if(snapshot.exists()){



const data = snapshot.data();





status.innerHTML =

`


💜 HE SAID YES!! 🌸


<br><br>


${data.message || ""}



<br><br>



📅 <b>Date:</b><br>

${data.date || "Not saved"}



<br><br>



🕒 <b>Time:</b><br>

${data.time || "Not saved"}



<br><br>



📍 <b>Location:</b><br>

${data.location || "Not saved"}



<br><br>



👗 <b>Dress Code:</b><br>

${data.dressCode || "Not saved"}



<br><br>



🎒 <b>Bring:</b><br>

${data.bring || "Not saved"}



<br><br>



🌸 <b>Plans:</b><br>

${data.plans || "Not saved"}


`;



}


}

);





</script>




</body>

</html>
